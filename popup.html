<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    select {
      width: 100%;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #f0f0f0;
    }
    button:active {
      background: #e0e0e0;
    }
    .primary {
      background: #4285f4;
      color: white;
      border-color: #4285f4;
    }
    .primary:hover {
      background: #3367d6;
    }
    .primary:active {
      background: #2851a3;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      font-weight: normal;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Set Zoom across All Tabs</h3>
  
  <div class="control-group">
    <label for="zoomLevel">Zoom Level:</label>
    <select id="zoomLevel">
      <option value="0.8">80%</option>
      <option value="0.9">90%</option>
      <option value="1.0" selected>100%</option>
      <option value="1.1">110%</option>
      <option value="1.2">120%</option>
      <option value="1.3">130%</option>
      <option value="1.5">150%</option>
      <option value="1.75">175%</option>
      <option value="2.0">200%</option>
      <option value="2.5">250%</option>
    </select>
  </div>

  <div class="button-group">
    <button id="applyBtn" class="primary">Apply to All Tabs</button>
  </div>

  <div class="button-group">
    <button id="resetBtn">Reset All</button>
  </div>

  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="applyToNew" checked>
      <label for="applyToNew">Apply to new tabs</label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
